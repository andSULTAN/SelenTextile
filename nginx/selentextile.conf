# NGINX Configuration Server bloki (Reverse Proxy)
# Joylashuv (Ubuntu'da): /etc/nginx/sites-available/selentextile.conf
# Faollashtirish uchun: ln -s /etc/nginx/sites-available/selentextile.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name selentextile.uz www.selentextile.uz; # O'zingizning domeningiz

    # 1. Frontend tomonga barcha qolgan so'rovlar (Next.js - Port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. Asosiy Backend teshikchasi (Django API va Admin paneli - Port 8000)
    location ~ ^/(api|admin_django)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Media va Static fayllar (Agar Docker ichi bilan volume orqali bog'lansa)
    # Eslatma: Docker gunicorn /staticfiles papkasini serve qilolmaydi, unga Nginx bevosita yo'l topishi kerak.
    location /static/ {
        alias /var/www/selen-textile/staticfiles/; # Containerdan chiqqan obyekt manzili
    }

    location /media/ {
        alias /var/www/selen-textile/media/;
    }

    # Loglarni saqlash qismi
    access_log /var/log/nginx/selen_access.log;
    error_log /var/log/nginx/selen_error.log;
}
